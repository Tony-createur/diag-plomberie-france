<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci | Diag Plomberie France</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --blue:#0d6efd;
      --blue-dark:#084298;
      --teal:#157f79;
      --teal-dark:#0f6a65;
      --bg:#f4f7fb;
      --white:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#dbe2ea;
      --shadow:0 18px 50px rgba(15,23,42,0.08);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(180deg,#eef5ff 0%, #f7fbff 35%, #f4f7fb 100%);
      color:var(--text);
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:48px 20px;
    }

    .card{
      background:var(--white);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:34px;
    }

    .top-badge{
      display:inline-block;
      margin-bottom:16px;
      background:#eaf3ff;
      color:var(--blue-dark);
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(30px,4vw,44px);
      line-height:1.1;
      color:#0f172a;
    }

    .intro{
      margin:0 0 28px;
      color:var(--muted);
      font-size:16px;
      line-height:1.7;
    }

    .alert-box{
      margin:0 0 24px;
      background:#fff7e6;
      border:1px solid #ffe0b2;
      border-radius:18px;
      padding:16px 18px;
      color:#7a4e00;
      font-size:15px;
      line-height:1.6;
      font-weight:600;
    }

    .grid{
      display:grid;
      gap:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:700;
    }

    input, textarea{
      width:100%;
      padding:16px;
      border:1px solid var(--border);
      border-radius:16px;
      font-size:16px;
      font-family:inherit;
    }

    textarea{
      min-height:170px;
      resize:vertical;
    }

    .btn{
      width:100%;
      margin-top:10px;
      border:none;
      border-radius:16px;
      padding:18px;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      background:var(--teal);
    }

    .btn:disabled{
      opacity:0.6;
    }

    .small{
      margin-top:16px;
      font-size:14px;
      color:var(--muted);
    }

    .hidden{display:none}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="top-badge">✅ Paiement confirmé</div>
      <h1>Merci pour votre paiement</h1>

      <p class="intro">
        Complétez votre demande pour recevoir votre diagnostic plomberie.
      </p>

      <div class="alert-box">
        ⏱ Plus votre demande est précise, plus votre diagnostic sera rapide et fiable.
      </div>

      <form id="demandeForm" name="demande-payee" method="POST" data-netlify="true" enctype="multipart/form-data">
        <input type="hidden" name="form-name" value="demande-payee" />
        <input type="hidden" name="session_id" id="session_id" />

        <div class="grid">
          <div>
            <label>Nom / Prénom</label>
            <input type="text" name="nom" required />
          </div>

          <div>
            <label>Email</label>
            <input type="email" name="email" required />
          </div>

          <div>
            <label>Téléphone</label>
            <input type="tel" name="telephone" required />
          </div>

          <div>
            <label>Ville</label>
            <input type="text" name="ville" required />
          </div>

          <div>
            <label>Problème</label>
            <textarea name="probleme" required></textarea>
          </div>
        </div>

        <button class="btn" id="submitBtn">Envoyer ma demande</button>

        <p class="small" id="formMessage">
          Après validation, votre demande sera envoyée.
        </p>
      </form>

    </div>
  </div>

  <script>
    const form = document.getElementById("demandeForm");
    const submitBtn = document.getElementById("submitBtn");
    const formMessage = document.getElementById("formMessage");
    const sessionInput = document.getElementById("session_id");

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    if (sessionId) {
      sessionInput.value = sessionId;
    } else {
      submitBtn.disabled = true;
      formMessage.textContent = "Lien invalide.";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = "Envoi...";

      try {
        const formData = new FormData(form);

        const response = await fetch("/.netlify/functions/submit-diagnostic", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = data.redirect;
        } else {
          formMessage.textContent = data.message;
          submitBtn.disabled = false;
          submitBtn.textContent = "Envoyer ma demande";
        }

      } catch (err) {
        formMessage.textContent = "Erreur serveur.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Envoyer ma demande";
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci | Diag Plomberie France</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1a1a1a;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      line-height: 1.6;
      color: #444;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid #d8d8d8;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .btn {
      display: inline-block;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      background: #0f766e;
      color: #fff;
      margin-top: 10px;
    }

    .small {
      font-size: 14px;
      color: #666;
      margin-top: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Merci pour votre paiement</h1>
      <p>
        Votre paiement a bien été reçu.  
        Pour recevoir votre diagnostic, merci de compléter ce formulaire.
      </p>

      <form
        name="demande-payee"
        method="POST"
        action="/demande-envoyee.html"
        data-netlify="true"
        netlify-honeypot="bot-field"
      >
        <input type="hidden" name="form-name" value="demande-payee" />

        <p class="hidden">
          <label>
            Ne pas remplir :
            <input name="bot-field" />
          </label>
        </p>

        <div class="grid">
          <div>
            <label for="nom">Nom / Prénom</label>
            <input type="text" id="nom" name="nom" required />
          </div>

          <div>
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div>
            <label for="telephone">Téléphone</label>
            <input type="tel" id="telephone" name="telephone" required />
          </div>

          <div>
            <label for="ville">Ville</label>
            <input type="text" id="ville" name="ville" required />
          </div>

          <div>
            <label for="urgence">Niveau d’urgence</label>
            <select id="urgence" name="urgence" required>
              <option value="">Choisir</option>
              <option value="Urgence absolue">Urgence absolue</option>
              <option value="Rapide">Rapide</option>
              <option value="Pas urgent">Pas urgent</option>
            </select>
          </div>

          <div>
            <label for="probleme">Décrivez votre problème</label>
            <textarea id="probleme" name="probleme" required></textarea>
          </div>
        </div>

        <button type="submit" class="btn">Envoyer ma demande</button>

        <p class="small">
          Après envoi, vous serez redirigé automatiquement vers la page de confirmation.
        </p>
      </form>
    </div>
  </div>
</body>
</html>

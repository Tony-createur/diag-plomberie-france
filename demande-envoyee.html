<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demande envoyée | Diag Plomberie France</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1a1a1a;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
    }

    p {
      color: #444;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      border-radius: 12px;
      background: #0f766e;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Demande bien envoyée</h1>
      <p>
        Merci, votre demande a bien été transmise.
        Nous pouvons maintenant traiter votre diagnostic.
      </p>
      <a href="/" class="btn">Retour à l’accueil</a>
    </div>
  </div>
</body>
</html>

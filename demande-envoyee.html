<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demande envoyée | Diag Plomberie France</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f7fb;
      color:#1f2937;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }
    .box{
      max-width:700px;
      width:100%;
      background:#fff;
      border-radius:20px;
      padding:40px 30px;
      box-shadow:0 12px 40px rgba(0,0,0,0.08);
      text-align:center;
    }
    h1{
      margin:0 0 16px;
      font-size:34px;
      color:#16a34a;
    }
    p{
      font-size:18px;
      line-height:1.6;
      margin:0 0 14px;
    }
    .small{
      font-size:15px;
      color:#6b7280;
      margin-top:18px;
    }
    a{
      display:inline-block;
      margin-top:24px;
      background:#0d6efd;
      color:#fff;
      text-decoration:none;
      padding:14px 24px;
      border-radius:12px;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>✅ Demande bien envoyée</h1>
    <p>Votre demande a bien été transmise.</p>
    <p>Nous allons l’examiner et revenir vers vous dès que possible par email.</p>
    <div class="small">
      Pensez à vérifier également vos courriers indésirables si vous attendez une réponse.
    </div>
    <a href="/">Retour à l’accueil</a>
  </div>
</body>
</html>
